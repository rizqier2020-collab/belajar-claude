services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jfp_user
      POSTGRES_PASSWORD: jfp_password
      POSTGRES_DB: jfp_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jfp_user -d jfp_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://jfp_user:jfp_password@db:5432/jfp_db
      SECRET_KEY: change-this-secret-key-in-production
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    volumes:
      - uploads:/app/uploads
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
  uploads:
