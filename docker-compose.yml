services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jfp_user}
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}'
      POSTGRES_DB: ${POSTGRES_DB:-jfp_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Tidak di-expose ke publik — backend mengakses via jaringan internal Docker.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jfp_user} -d ${POSTGRES_DB:-jfp_db}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jfp_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-jfp_db}
      SECRET_KEY: '${SECRET_KEY:?Set SECRET_KEY in .env (see README for how to generate one)}'
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    volumes:
      - uploads:/app/uploads
    # Port 8000 tidak di-expose langsung; akses API lewat proxy /api/ di frontend (nginx).

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
  uploads:
